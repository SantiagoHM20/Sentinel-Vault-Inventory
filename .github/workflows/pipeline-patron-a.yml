name: pipeline-patron-a

on:
  workflow_dispatch:
  push:
    paths:
      - "app.py"
      - "templates/**"
      - "k8s/manifest-patron-a.yml"
      - "Dockerfile"
      - "requirements.txt"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t sentinel-vault-inventory:latest .

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy Patron A
        run: kubectl apply -f k8s/manifest-patron-a.yml
