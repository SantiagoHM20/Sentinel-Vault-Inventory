name: pipeline-patron-b
on:
  workflow_dispatch:
  push:
    paths:
      - "app.py"
      - "templates/**"
      - "k8s/manifest-patron-b.yml"
      - "Dockerfile"
      - "requirements.txt"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name acrcloudsec

      - name: Build and push image to ACR
        run: |
          docker build -t acrcloudsec.azurecr.io/sentinel-vault-inventory:patron-b .
          docker push acrcloudsec.azurecr.io/sentinel-vault-inventory:patron-b

      # No hay extracción de secreto aquí — el pipeline nunca toca el valor

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy Patron B
        run: kubectl apply -f k8s/manifest-patron-b.yml
